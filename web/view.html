<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>terminal-animations</title>
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<link rel="preload" as="font" type="font/woff2" href="./fonts/departure-mono-subset.woff2" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="./fonts/jetbrains-mono-regular-subset.woff2" crossorigin>
<link rel="stylesheet" href="./style.css">
<style>
  /* The animation fills the viewport and nothing frames it — no border, no mask,
     no gradient. Its own edge vignette fades to black and the page is black, so
     the canvas edge has nothing to reveal. */
  html, body { height: 100%; overflow: hidden; }
  #stage {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: var(--void);
  }
  canvas { display: block; image-rendering: pixelated; }

  /* The poster paints immediately while the module streams. It is the same frame
     through the same sub-cell model (ansi2png.py), so the cross-fade to the live
     canvas is a change of resolution, not of appearance. */
  /* An <img>, not a CSS background: a background on an element that never gets a
     visible frame can have its fetch optimised away entirely, which is exactly what
     happened when the module arrived faster than the first paint. */
  #poster {
    position: fixed; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    image-rendering: pixelated;
    transition: opacity .35s ease;
  }
  body.live #poster { opacity: 0; pointer-events: none; }
  #main-canvas { opacity: 0; transition: opacity .35s ease; }
  body.live #main-canvas { opacity: 1; }

  /* Chrome floats over the animation and gets out of the way. */
  #chrome {
    position: fixed; inset: 0;
    pointer-events: none;
    transition: opacity .5s ease;
    padding: 22px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  body.idle #chrome { opacity: 0; }
  #chrome a, #chrome button, #chrome select { pointer-events: auto; }

  .top { display: flex; align-items: baseline; gap: 11px; }
  .bottom { display: flex; align-items: flex-end; justify-content: space-between; gap: 22px; }

  /* A quiet rule, not a box-drawing corner. The gallery is where the BBS
     structure lives; over a full-bleed animation the chrome's job is to stay out
     of the way, and a floating └ read as a stray mark rather than as structure. */
  .ident { border-left: 1px solid var(--rule); padding-left: 12px; }
  .ident h1 { margin: 0; font-size: 22px; font-family: var(--display); font-weight: 400; color: var(--accent); }
  .ident .blurb { margin: 2px 0 0; color: var(--ink); }
  .ident .facts { margin: 2px 0 0; color: var(--dim); font-size: 12px; }
  .facts span:empty { display: none; }
  .facts span + span::before { content: ' · '; color: var(--rule); }

  .keys { color: var(--dim); font-size: 12px; text-align: right; white-space: nowrap; }
  .keys div + div { margin-top: 3px; }

  /* --- the dev panel: the authoring harness, hidden until asked for ---------
     Same page, same Pane painter as the visitor view, so what gets tuned here is
     exactly what a visitor sees. */
  #dev {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: #07060b;
    border-top: 1px solid var(--rule);
    padding: 10px 16px;
    display: none;
    max-height: 60vh; overflow: auto;
  }
  body.dev #dev { display: block; }
  body.dev #chrome { opacity: 1; }

  #dev .row { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  #dev .row + .row { margin-top: 8px; }
  #dev label { display: flex; align-items: center; gap: 6px; color: var(--dim); }
  /* A `display` rule on an element outranks the UA stylesheet's [hidden] rule, so
     the panel's own layout would otherwise keep [hidden] controls on screen. */
  #dev [hidden] { display: none; }
  #dev input[type=number], #dev button, #dev select {
    background: #14121c; color: var(--ink);
    border: 1px solid var(--rule); border-radius: 3px;
    padding: 4px 8px; font: inherit;
  }
  #dev input[type=number] { width: 62px; }
  #dev button { cursor: pointer; }
  #dev button:hover { border-color: var(--accent); }
  #dev input:disabled, #dev button:disabled { opacity: .4; cursor: not-allowed; }
  #tick { width: 260px; accent-color: var(--accent); }
  .ok { color: #6ee7a8; }
  .err { color: #ff8080; }
  #compare-wrap { margin-top: 10px; }
  #compare-wrap canvas { border: 1px solid var(--rule); max-width: 100%; }
  .pane-label { color: var(--dim); margin: 0 0 6px; font-size: 12px; }

  /* Reduced motion: the poster is the whole experience unless explicitly asked
     otherwise, and the WASM is never fetched. */
  #motion-gate {
    position: fixed; inset: 0; display: none;
    place-items: center; text-align: center; padding: 22px;
    background: color-mix(in srgb, var(--void) 72%, transparent); z-index: 5;
  }
  body.gated #motion-gate { display: grid; }
  #motion-gate button {
    background: transparent; color: var(--accent);
    border: 1px solid var(--rule); border-radius: 3px;
    padding: 8px 16px; font: inherit; cursor: pointer; margin-top: 14px;
  }
  #motion-gate button:hover { border-color: var(--accent); }

  @media (max-width: 760px) {
    #chrome { padding: 14px; }
    .bottom { flex-direction: column; align-items: flex-start; }
    .keys { text-align: left; }
  }
  /* Keyboard hints on a device with no keyboard are just noise. Width is the
     belt to the pointer query's braces: a 390px viewport is a phone whether or
     not the pointer media feature reports coarse. */
  @media (hover: none) and (pointer: coarse) { .keys { display: none; } }
  @media (max-width: 760px) { .keys { display: none; } }
</style>
</head>
<body>

<div id="stage">
  <img id="poster" alt="" aria-hidden="true" decoding="async">
  <canvas id="main-canvas"></canvas>
</div>

<div id="chrome">
  <div class="top">
    <a class="wordmark d11 dim" href="./index.html">terminal-animations</a>
    <span class="dim" style="font-size:12px" id="status">loading…</span>
    <span class="err" id="deferred"></span>
  </div>

  <div class="bottom">
    <div class="ident">
      <div>
        <h1 id="anim-name">…</h1>
        <p class="blurb" id="anim-blurb"></p>
        <p class="facts">
          <span id="anim-rung"></span>
          <span id="loop-note"></span>
          <span id="perf" class="dim"></span>
          <span class="dim">pane <span id="dims">—</span></span>
        </p>
      </div>
    </div>
    <div class="keys">
      <div><kbd>~</kbd> harness &nbsp; <kbd>esc</kbd> index</div>
      <div><kbd>space</kbd> play &nbsp; <kbd>←</kbd> <kbd>→</kbd> step</div>
    </div>
  </div>
</div>

<div id="motion-gate">
  <div>
    <p class="display d22 accent" style="margin:0" id="gate-title">motion paused</p>
    <p class="dim" style="max-width:34em" id="gate-body">
      Your system asks for reduced motion, so this is a still frame — the 2&nbsp;MB
      animation module has not been downloaded.
    </p>
    <button id="play-anyway">play it anyway</button>
  </div>
</div>

<aside id="dev">
  <div class="row">
    <!-- Revealed only once the manifest shows a second animation to switch to. -->
    <label id="anim-picker-row" hidden>animation <select id="anim-picker" aria-label="animation"></select></label>
    <label>w <input type="number" id="width" value="100" min="1" max="400"></label>
    <label>h <input type="number" id="height" value="30" min="1" max="200"></label>
    <label>cell <input type="number" id="cell" value="8" min="2" max="32"></label>
    <button id="fit">fit to window</button>
    <button id="play">▶ play</button>
    <button id="step">step</button>
    <label>fps <input type="number" id="fps" value="30" min="1" max="120"></label>
  </div>
  <div class="row">
    <label>tick <input type="range" id="tick" value="0" min="0" max="1"></label>
    <span class="dim" id="tick-label">0</span>
    <label><input type="checkbox" id="compare-toggle"> compare</label>
    <label>+Δ <input type="number" id="offset" value="0"></label>
  </div>
  <div id="compare-wrap" style="display:none">
    <p class="pane-label">tick + Δ — identical to the pane above means the loop is seamless</p>
    <canvas id="compare-canvas"></canvas>
  </div>
</aside>

<script src="wasm_exec.js"></script>
<!-- A module, so it can import the sub-cell tables from glyphs.js. wasm_exec.js
     stays a classic script: it and the Go runtime talk through globals (Go,
     renderFrame, animPeriod), which a module can read but not export. -->
<script type="module" src="harness.js"></script>
</body>
</html>
